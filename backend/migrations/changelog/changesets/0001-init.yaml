# backend/migrations/changelog/changesets/0001-init.yaml
databaseChangeLog:
  - changeSet:
      id: 0001-create-plant-config
      author: tommi
      preConditions:
        onFail: MARK_RAN
        not:
          - tableExists:
              tableName: plant_config
      changes:
        - createTable:
            tableName: plant_config
            columns:
              - column:
                  name: id
                  type: VARCHAR(50)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: moisture_min
                  type: INT
                  defaultValueNumeric: 35
                  constraints:
                    nullable: false
              - column:
                  name: moisture_max
                  type: INT
                  defaultValueNumeric: 70
                  constraints:
                    nullable: false
              - column:
                  name: auto_enabled
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: start_enabled
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: stop_enabled
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: relay_pin
                  type: INT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
      rollback:
        - dropTable:
            tableName: plant_config

  - changeSet:
      id: 0002-create-plant-history
      author: tommi
      changes:
        - createTable:
            tableName: plant_history
            columns:
              - column:
                  name: id
                  type: SERIAL
                  constraints:
                    primaryKey: true
              - column:
                  name: plant_id
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: moisture
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: pump_state
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: timestamp
                  type: TIMESTAMPTZ
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: plant_history
            baseColumnNames: plant_id
            referencedTableName: plant_config
            referencedColumnNames: id
            constraintName: fk_history_plant
            onDelete: CASCADE
      rollback:
        - dropTable:
            tableName: plant_history

  - changeSet:
      id: 0003-create-history-index
      author: tommi
      changes:
        - createIndex:
            indexName: idx_history_plant_time
            tableName: plant_history
            columns:
              - column:
                  name: plant_id
              - column:
                  name: timestamp
      rollback:
        - dropIndex:
            indexName: idx_history_plant_time
            tableName: plant_history